name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  # ECR repositories must exist before `build-and-push` can push images to
  # them. We deploy EcrStack first so brand-new repositories (e.g. when a new
  # worker is added) are created ahead of the push step, avoiding 403 errors.
  deploy-ecr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - working-directory: infra
        run: npm ci

      - working-directory: infra
        run: npx cdk deploy EcrStack --require-approval never

  build-and-push:
    runs-on: ubuntu-latest
    needs: [deploy-ecr]
    strategy:
      matrix:
        image:
          - name: script-generator
            dockerfile: packages/script-generator/Dockerfile
          - name: metadata-generator
            dockerfile: packages/metadata-generator/Dockerfile
          - name: tts-worker
            dockerfile: packages/tts-worker/Dockerfile
          - name: video-worker
            dockerfile: packages/video-worker/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ matrix.image.name }}:latest,${{ env.ECR_REGISTRY }}/${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  deploy-infra:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - working-directory: infra
        run: npm ci

      - working-directory: infra
        run: npx cdk deploy VideoFactoryStack --require-approval never -c imageTag=${{ github.sha }}
