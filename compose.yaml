services:
  voicevox:
    image: voicevox/voicevox_engine:cpu-latest
    ports:
      - "50021:50021"

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ROOT_USER: rustfsadmin
      RUSTFS_ROOT_PASSWORD: rustfsadmin
    command: server /data --console-address ":9001"
    volumes:
      - rustfs-data:/data

  bucket-init:
    image: rustfs/rc:latest
    depends_on:
      - rustfs
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      rc alias set local http://rustfs:9000 rustfsadmin rustfsadmin;
      rc mb local/video-factory;
      "
    restart: "no"

  script-generator:
    build:
      context: .
      dockerfile: packages/script-generator/Dockerfile.dev
    depends_on:
      bucket-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT_URL: http://rustfs:9000
      S3_BUCKET: video-factory
      S3_ACCESS_KEY_ID: rustfsadmin
      S3_SECRET_ACCESS_KEY: rustfsadmin
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      TAVILY_API_KEY: ${TAVILY_API_KEY}

  metadata-generator:
    build:
      context: .
      dockerfile: packages/metadata-generator/Dockerfile.dev
    depends_on:
      bucket-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT_URL: http://rustfs:9000
      S3_BUCKET: video-factory
      S3_ACCESS_KEY_ID: rustfsadmin
      S3_SECRET_ACCESS_KEY: rustfsadmin
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}

  tts-worker:
    build:
      context: .
      dockerfile: packages/tts-worker/Dockerfile
    depends_on:
      bucket-init:
        condition: service_completed_successfully
      voicevox:
        condition: service_started
    environment:
      S3_ENDPOINT_URL: http://rustfs:9000
      S3_BUCKET: video-factory
      S3_ACCESS_KEY_ID: rustfsadmin
      S3_SECRET_ACCESS_KEY: rustfsadmin
      VOICEVOX_URL: http://voicevox:50021

  video-worker:
    build:
      context: .
      dockerfile: packages/video-worker/Dockerfile
    depends_on:
      bucket-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT_URL: http://rustfs:9000
      S3_BUCKET: video-factory
      S3_ACCESS_KEY_ID: rustfsadmin
      S3_SECRET_ACCESS_KEY: rustfsadmin

volumes:
  rustfs-data:
